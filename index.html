<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#061426">
<title>청렴 에너지 히어로 — Mobile Demo v6.2</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:#061426;
  font-family:Arial,"Malgun Gothic",sans-serif;
  overscroll-behavior:none;
  user-select:none;
  -webkit-user-select:none;
}

body{
  min-height:100dvh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  overflow-x:hidden;
  padding:
    max(8px,env(safe-area-inset-top))
    max(8px,env(safe-area-inset-right))
    max(8px,env(safe-area-inset-bottom))
    max(8px,env(safe-area-inset-left));
}

/* 세로 화면: 게임 화면과 조작부를 완전히 분리 */
#app{
  width:min(100%,1280px);
  display:flex;
  flex-direction:column;
  align-items:stretch;
  gap:10px;
}

#game-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  background:#07192b;
  border-radius:12px;
  box-shadow:0 8px 30px #0008;
}

canvas{
  display:block;
  width:100%;
  height:100%;
  background:#07192b;
  touch-action:none;
}

#loading{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  background:#061426;
  color:white;
  font-size:20px;
  z-index:20;
}

/* 게임 화면 아래 전용 조작 영역 */
#mobile-controls{
  display:none;
  width:100%;
  min-height:76px;
  padding:8px 10px max(8px,env(safe-area-inset-bottom));
  border:1px solid rgba(151,220,255,.16);
  border-radius:16px;
  background:rgba(3,20,38,.82);
  box-shadow:0 8px 24px #0005;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  touch-action:none;
}

.control-group{
  display:flex;
  align-items:center;
  gap:10px;
}

.control-group.move{
  justify-content:flex-start;
}

.control-group.action{
  justify-content:flex-end;
}

.touch-btn{
  width:54px;
  height:54px;
  flex:0 0 54px;
  border-radius:50%;
  border:1.5px solid rgba(210,244,255,.56);
  background:rgba(9,37,61,.82);
  box-shadow:
    0 4px 10px #0006,
    inset 0 0 12px rgba(117,220,255,.11);
  color:rgba(255,255,255,.92);
  font:700 23px/1 Arial,"Malgun Gothic",sans-serif;
  display:grid;
  place-items:center;
  touch-action:none;
}

.touch-btn.action-btn{
  border-color:rgba(255,230,138,.68);
  background:rgba(65,38,20,.88);
}

.touch-btn.shield-btn{
  border-color:rgba(151,233,255,.75);
  background:rgba(12,58,86,.9);
}

.touch-btn.pressed,
.touch-btn:active{
  transform:scale(.9);
  filter:brightness(1.3);
  box-shadow:
    0 2px 7px #0008,
    inset 0 0 20px rgba(255,255,255,.22);
}

.control-label{
  display:block;
  margin-top:3px;
  color:#afcad8;
  font-size:10px;
  font-weight:700;
  text-align:center;
}

.button-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

@media (pointer:coarse),(max-width:900px){
  #mobile-controls{
    display:flex;
  }
}

/* 작은 세로 화면에서도 버튼이 게임을 덮지 않도록 더 작게 */
@media (max-width:430px){
  body{
    padding-left:6px;
    padding-right:6px;
  }

  #app{
    gap:8px;
  }

  #game-wrap{
    border-radius:9px;
  }

  #mobile-controls{
    min-height:68px;
    padding:7px 8px max(7px,env(safe-area-inset-bottom));
    gap:8px;
  }

  .control-group{
    gap:7px;
  }

  .touch-btn{
    width:48px;
    height:48px;
    flex-basis:48px;
    font-size:20px;
  }

  .control-label{
    font-size:9px;
  }
}

/* PC에서는 기존처럼 화면만 표시 */
@media (pointer:fine) and (min-width:901px){
  body{
    min-height:100vh;
    align-items:center;
  }

  #app{
    width:min(100vw,1280px);
  }
}
</style>
</head>

<body>
<div id="loading">에셋 불러오는 중…</div>

<main id="app">
  <div id="game-wrap">
    <canvas id="c" width="1280" height="720" aria-label="청렴 에너지 히어로 게임"></canvas>
  </div>

  <nav id="mobile-controls" aria-label="모바일 조작 버튼">
    <div class="control-group move">
      <div class="button-wrap">
        <button class="touch-btn" id="btn-left" aria-label="왼쪽 이동">◀</button>
        <span class="control-label">왼쪽</span>
      </div>
      <div class="button-wrap">
        <button class="touch-btn" id="btn-right" aria-label="오른쪽 이동">▶</button>
        <span class="control-label">오른쪽</span>
      </div>
    </div>

    <div class="control-group action">
      <div class="button-wrap">
        <button class="touch-btn action-btn" id="btn-attack" aria-label="청렴의 검 공격">⚔</button>
        <span class="control-label">공격</span>
      </div>
      <div class="button-wrap">
        <button class="touch-btn shield-btn" id="btn-shield" aria-label="이해충돌 방패">🛡</button>
        <span class="control-label">방패</span>
      </div>
    </div>
  </nav>
</main>

<script src="game.js"></script>
</body>
</html>
