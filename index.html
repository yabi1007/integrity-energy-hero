<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#061426">
<title>청렴 에너지 히어로 — Final v10.1</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:#061426;
  font-family:Arial,"Malgun Gothic",sans-serif;
  overscroll-behavior:none;
  user-select:none;
  -webkit-user-select:none;
}

body{
  min-height:100dvh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  overflow-x:hidden;
  padding:
    max(8px,env(safe-area-inset-top))
    max(8px,env(safe-area-inset-right))
    max(8px,env(safe-area-inset-bottom))
    max(8px,env(safe-area-inset-left));
}

/* 세로 화면: 게임 화면과 조작부를 완전히 분리 */
#app{
  width:min(100%,1280px);
  display:flex;
  flex-direction:column;
  align-items:stretch;
  gap:10px;
}

#game-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  background:#07192b;
  border-radius:12px;
  box-shadow:0 8px 30px #0008;
}

canvas{
  display:block;
  width:100%;
  height:100%;
  max-width:100%;
  max-height:100%;
  background:#07192b;
  touch-action:none;
}

#loading{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  background:#061426;
  color:white;
  font-size:20px;
  z-index:20;
}

/* 게임 화면 아래 전용 조작 영역 */
#mobile-controls{
  display:none;
  width:100%;
  min-height:76px;
  padding:8px 10px max(8px,env(safe-area-inset-bottom));
  border:1px solid rgba(151,220,255,.16);
  border-radius:16px;
  background:rgba(3,20,38,.82);
  box-shadow:0 8px 24px #0005;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  touch-action:none;
}

.control-group{
  display:flex;
  align-items:center;
  gap:10px;
}

.control-group.move{
  justify-content:flex-start;
}

.control-group.action{
  justify-content:flex-end;
}

.touch-btn{
  width:54px;
  height:54px;
  flex:0 0 54px;
  border-radius:50%;
  border:1.5px solid rgba(210,244,255,.56);
  background:rgba(9,37,61,.82);
  box-shadow:
    0 4px 10px #0006,
    inset 0 0 12px rgba(117,220,255,.11);
  color:rgba(255,255,255,.92);
  font:700 23px/1 Arial,"Malgun Gothic",sans-serif;
  display:grid;
  place-items:center;
  touch-action:none;
}

.touch-btn.action-btn{
  border-color:rgba(255,230,138,.68);
  background:rgba(65,38,20,.88);
}

.touch-btn.shield-btn{
  border-color:rgba(151,233,255,.75);
  background:rgba(12,58,86,.9);
}

.touch-btn.pressed,
.touch-btn:active{
  transform:scale(.9);
  filter:brightness(1.3);
  box-shadow:
    0 2px 7px #0008,
    inset 0 0 20px rgba(255,255,255,.22);
}

.control-label{
  display:block;
  margin-top:3px;
  color:#afcad8;
  font-size:10px;
  font-weight:700;
  text-align:center;
}

.button-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

@media (pointer:coarse),(max-width:900px){
  #mobile-controls{
    display:flex;
  }
}

/* 작은 세로 화면에서도 버튼이 게임을 덮지 않도록 더 작게 */
@media (max-width:430px){
  body{
    padding-left:6px;
    padding-right:6px;
  }

  #app{
    gap:8px;
  }

  #game-wrap{
    border-radius:9px;
  }

  #mobile-controls{
    min-height:68px;
    padding:7px 8px max(7px,env(safe-area-inset-bottom));
    gap:8px;
  }

  .control-group{
    gap:7px;
  }

  .touch-btn{
    width:48px;
    height:48px;
    flex-basis:48px;
    font-size:20px;
  }

  .control-label{
    font-size:9px;
  }
}

/* PC: 브라우저의 가로·세로 크기를 모두 기준으로 16:9 화면을 맞춘다.
   화면 높이가 낮은 노트북에서도 위·아래가 잘리지 않는다. */
@media (pointer:fine) and (min-width:901px){
  html,body{
    width:100%;
    height:100%;
    min-height:100%;
    overflow:hidden;
  }

  body{
    min-height:100dvh;
    align-items:center;
    padding:12px;
  }

  #app{
    width:min(
      1280px,
      calc(100vw - 24px),
      calc((100dvh - 24px) * 16 / 9)
    );
    max-height:calc(100dvh - 24px);
  }

  #game-wrap{
    width:100%;
    max-height:calc(100dvh - 24px);
  }
}

/* 유혹 슬라임 청렴 퀴즈 */
#quiz-overlay{position:absolute;inset:0;z-index:15;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(2,10,20,.82);backdrop-filter:blur(4px)}
#quiz-overlay.active{display:flex}
#quiz-card{width:min(92%,620px);max-height:92%;overflow:auto;padding:24px;border:1px solid rgba(147,226,255,.42);border-radius:20px;background:linear-gradient(180deg,rgba(13,38,61,.98),rgba(6,23,39,.98));box-shadow:0 16px 50px #000b;color:#fff;text-align:center}
#quiz-slime-quote{margin:0 0 10px;color:#ffd978;font-size:16px;font-weight:700}
#quiz-title{margin:0 0 14px;font-size:26px}
#quiz-question{margin:0 0 18px;color:#e7f6ff;font-size:17px;line-height:1.55}
#quiz-choices{display:grid;gap:10px}
.quiz-choice{width:100%;min-height:48px;padding:12px 14px;border:1px solid rgba(182,231,255,.35);border-radius:12px;background:rgba(18,59,88,.88);color:#fff;font-size:15px;font-weight:700;line-height:1.4;cursor:pointer}
.quiz-choice:active{transform:scale(.98)}
#quiz-result{display:none;margin-top:18px;padding:14px;border-radius:12px;background:rgba(0,0,0,.24)}
#quiz-result.active{display:block}
#quiz-result-title{margin:0 0 8px;font-size:19px}
#quiz-result-explain{margin:0;color:#d7ebf5;font-size:14px;line-height:1.55}
#quiz-continue{display:none;width:100%;min-height:48px;margin-top:14px;border:0;border-radius:12px;background:#ffd34f;color:#172235;font-size:16px;font-weight:800;cursor:pointer}
#quiz-continue.active{display:block}
@media (max-width:430px){#quiz-overlay{padding:12px}#quiz-card{padding:18px 15px;border-radius:16px}#quiz-title{font-size:21px}#quiz-question{font-size:15px}.quiz-choice{font-size:14px}}


/* =========================================================
   v9.0 모바일 가로모드 최적화
   - 게임 전체를 실제 보이는 브라우저 영역(100dvh) 안에 맞춤
   - 조작 버튼을 게임 위에 겹쳐 배치해 세로 공간을 추가로 쓰지 않음
   - 퀴즈창은 내부 스크롤이 가능하고 화면 밖으로 나가지 않음
   ========================================================= */

#app{
  position:relative;
}

/* 모바일 가로모드 */
@media (orientation:landscape) and (pointer:coarse),
       (orientation:landscape) and (max-height:600px){

  html,
  body{
    width:100%;
    height:100%;
    min-height:100%;
    overflow:hidden;
  }

  body{
    width:100vw;
    height:100dvh;
    min-height:100dvh;
    padding:
      env(safe-area-inset-top)
      env(safe-area-inset-right)
      env(safe-area-inset-bottom)
      env(safe-area-inset-left);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #app{
    width:min(
      calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right)),
      calc((100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)) * 16 / 9)
    );
    height:min(
      calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)),
      calc((100vw - env(safe-area-inset-left) - env(safe-area-inset-right)) * 9 / 16)
    );
    max-width:none;
    max-height:none;
    display:block;
    gap:0;
  }

  #game-wrap{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    aspect-ratio:auto;
    border-radius:0;
    overflow:hidden;
    box-shadow:none;
  }

  canvas{
    width:100%;
    height:100%;
    object-fit:contain;
  }

  /* 조작부가 게임 아래에 붙어 전체 높이가 커지지 않도록 게임 위에 배치 */
  #mobile-controls{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    z-index:12;
    width:100%;
    min-height:0;
    padding:
      8px
      max(12px,env(safe-area-inset-right))
      max(8px,env(safe-area-inset-bottom))
      max(12px,env(safe-area-inset-left));
    border:0;
    border-radius:0;
    background:linear-gradient(180deg,transparent,rgba(2,12,24,.58));
    box-shadow:none;
    pointer-events:none;
  }

  .control-group,
  .button-wrap,
  .touch-btn{
    pointer-events:auto;
  }

  .control-group{
    gap:8px;
  }

  .touch-btn{
    width:52px;
    height:52px;
    flex-basis:52px;
    font-size:21px;
    background:rgba(9,37,61,.72);
    backdrop-filter:blur(4px);
  }

  .control-label{
    display:none;
  }

  /* 가로모드 퀴즈: 화면 안에 완전히 들어오고 카드 내부만 스크롤 */
  #quiz-overlay{
    inset:0;
    z-index:30;
    padding:
      max(3px,env(safe-area-inset-top))
      max(6px,env(safe-area-inset-right))
      max(3px,env(safe-area-inset-bottom))
      max(6px,env(safe-area-inset-left));
    overflow:hidden;
    align-items:stretch;
    pointer-events:auto;
    touch-action:none;
  }

  #quiz-card{
    width:min(98%,820px);
    height:100%;
    max-height:100%;
    margin:auto;
    padding:8px 12px 10px;
    border-radius:12px;
    overflow-x:hidden;
    overflow-y:auto;
    overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
    scroll-padding-bottom:58px;
  }

  #quiz-slime-quote{
    margin-bottom:2px;
    font-size:11px;
  }

  #quiz-title{
    margin-bottom:4px;
    font-size:17px;
    line-height:1.15;
  }

  #quiz-question{
    margin-bottom:6px;
    font-size:12px;
    line-height:1.3;
  }

  #quiz-choices{
    gap:4px;
  }

  .quiz-choice{
    min-height:32px;
    padding:6px 8px;
    border-radius:8px;
    font-size:11px;
    line-height:1.24;
    touch-action:manipulation;
  }

  #quiz-result{
    margin-top:5px;
    padding:6px 8px;
  }

  #quiz-result-title{
    margin-bottom:2px;
    font-size:14px;
  }

  #quiz-result-explain{
    font-size:10.5px;
    line-height:1.3;
  }

  #quiz-continue{
    position:sticky;
    bottom:0;
    z-index:4;
    min-height:42px;
    margin-top:6px;
    font-size:14px;
    box-shadow:0 -8px 16px rgba(6,23,39,.92),0 5px 12px rgba(0,0,0,.35);
    touch-action:manipulation;
    pointer-events:auto;
  }

  #build-version{
    right:max(5px,env(safe-area-inset-right)) !important;
    bottom:max(5px,env(safe-area-inset-bottom)) !important;
    font-size:9px !important;
    opacity:.72;
  }
}

/* v9.6: 퀴즈가 열려 있는 동안 하단 모바일 조작부가 터치를 가로채지 않도록 완전히 숨긴다. */
body.quiz-open #mobile-controls{
  opacity:0 !important;
  visibility:hidden !important;
  pointer-events:none !important;
}

body.quiz-open #mobile-controls *{
  pointer-events:none !important;
}

/* 세로모드에서는 게임보다 회전 안내를 우선 표시 */
#rotate-notice{
  display:none;
}

@media (orientation:portrait) and (pointer:coarse){
  #rotate-notice{
    position:fixed;
    inset:0;
    z-index:10000;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
    background:#061426;
    color:#fff;
    text-align:center;
    font-size:20px;
    font-weight:800;
    line-height:1.6;
  }
}


/* =========================================================
   v9.2 최종 결과 인증 화면
   - Z / Enter / Space로 넘어가지 않음
   - 마우스 클릭 또는 모바일 탭으로 '다시하기' 버튼을 눌러야 이동
   ========================================================= */
#result-actions{
  position:absolute;
  inset:0;
  z-index:18;
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:0 20px 72px;
  pointer-events:none;
}

#result-actions.active{
  display:flex;
}

#result-card{
  width:min(88%,520px);
  padding:16px 18px;
  border:1px solid rgba(162,235,255,.52);
  border-radius:18px;
  background:rgba(4,24,42,.88);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  backdrop-filter:blur(7px);
  text-align:center;
  color:#fff;
  pointer-events:auto;
}

#result-guide{
  margin:0 0 12px;
  color:#e8f8ff;
  font-size:16px;
  font-weight:800;
  line-height:1.45;
}

#result-restart{
  width:100%;
  min-height:56px;
  border:1px solid rgba(194,255,229,.72);
  border-radius:14px;
  background:linear-gradient(180deg,#33c98b,#169d69);
  box-shadow:0 7px 18px rgba(0,0,0,.32), inset 0 1px rgba(255,255,255,.25);
  color:#fff;
  font:800 18px/1 Arial,"Malgun Gothic",sans-serif;
  cursor:pointer;
  touch-action:manipulation;
}

#result-restart:active{
  transform:scale(.98);
  filter:brightness(1.1);
}

@media (orientation:landscape) and (max-height:600px){
  #result-actions{
    padding:
      0
      max(14px,env(safe-area-inset-right))
      max(18px,env(safe-area-inset-bottom))
      max(14px,env(safe-area-inset-left));
  }

  #result-card{
    width:min(72%,500px);
    padding:10px 14px;
    border-radius:14px;
  }

  #result-guide{
    margin-bottom:8px;
    font-size:13px;
  }

  #result-restart{
    min-height:44px;
    font-size:15px;
  }
}


/* =========================================================
   v9.7 Safari 전용 Chrome 권장 안내
   ========================================================= */
#browser-notice{
  position:fixed;
  inset:0;
  z-index:20000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:
    max(18px,env(safe-area-inset-top))
    max(18px,env(safe-area-inset-right))
    max(18px,env(safe-area-inset-bottom))
    max(18px,env(safe-area-inset-left));
  background:rgba(2,10,20,.82);
  backdrop-filter:blur(7px);
}

#browser-notice.active{
  display:flex;
}

#browser-notice-card{
  width:min(92%,430px);
  padding:24px 22px 20px;
  border:1px solid rgba(158,231,255,.48);
  border-radius:20px;
  background:linear-gradient(180deg,rgba(14,42,67,.98),rgba(6,24,41,.98));
  box-shadow:0 18px 54px rgba(0,0,0,.62);
  color:#fff;
  text-align:center;
}

#browser-notice-icon{
  margin:0 0 8px;
  font-size:34px;
}

#browser-notice-title{
  margin:0 0 10px;
  font-size:22px;
  line-height:1.3;
}

#browser-notice-text{
  margin:0;
  color:#dceef7;
  font-size:15px;
  line-height:1.6;
}

#browser-notice-text strong{
  color:#ffd75e;
}

#browser-notice-confirm{
  width:100%;
  min-height:50px;
  margin-top:18px;
  border:0;
  border-radius:13px;
  background:linear-gradient(180deg,#ffd85e,#eeb52d);
  box-shadow:0 6px 16px rgba(0,0,0,.3);
  color:#172235;
  font:800 16px/1 Arial,"Malgun Gothic",sans-serif;
  cursor:pointer;
  touch-action:manipulation;
}

#browser-notice-confirm:active{
  transform:scale(.98);
  filter:brightness(1.05);
}

@media (orientation:landscape) and (max-height:600px){
  #browser-notice{
    padding:8px max(12px,env(safe-area-inset-right))
            8px max(12px,env(safe-area-inset-left));
  }

  #browser-notice-card{
    width:min(78%,520px);
    padding:14px 18px 13px;
    border-radius:15px;
  }

  #browser-notice-icon{
    margin-bottom:4px;
    font-size:25px;
  }

  #browser-notice-title{
    margin-bottom:5px;
    font-size:18px;
  }

  #browser-notice-text{
    font-size:12px;
    line-height:1.45;
  }

  #browser-notice-confirm{
    min-height:40px;
    margin-top:10px;
    font-size:14px;
  }
}


/* =========================================================
   v10.0 퀴즈 2단계 화면
   - 답 선택 전: 문제와 보기
   - 답 선택 후: 문제/보기 숨김, 정답과 해설만 표시
   - 모바일 스크롤 불필요
   ========================================================= */
#quiz-result-answer{
  margin:0;
  color:#fff2ad;
  font-size:15px;
  font-weight:800;
  line-height:1.5;
}

#quiz-result-divider{
  width:100%;
  height:1px;
  margin:12px 0;
  background:linear-gradient(90deg,transparent,rgba(185,232,255,.5),transparent);
}

#quiz-card.answered{
  overflow:hidden !important;
}

#quiz-card.answered #quiz-slime-quote,
#quiz-card.answered #quiz-title,
#quiz-card.answered #quiz-question,
#quiz-card.answered #quiz-choices{
  display:none !important;
}

#quiz-card.answered #quiz-result{
  display:block;
  margin-top:0;
  padding:18px;
}

#quiz-card.answered #quiz-result-title{
  margin:0 0 12px;
  font-size:22px;
}

#quiz-card.answered #quiz-continue{
  display:block;
  position:static;
  margin-top:14px;
}

@media (orientation:landscape) and (max-height:600px){
  #quiz-card.answered{
    width:min(92%,700px);
    height:auto;
    max-height:calc(100% - 12px);
    align-self:center;
    padding:12px 14px;
  }

  #quiz-card.answered #quiz-result{
    padding:10px 12px;
  }

  #quiz-card.answered #quiz-result-title{
    margin-bottom:7px;
    font-size:18px;
  }

  #quiz-card.answered #quiz-result-answer{
    font-size:12px;
    line-height:1.35;
  }

  #quiz-card.answered #quiz-result-divider{
    margin:7px 0;
  }

  #quiz-card.answered #quiz-result-explain{
    font-size:11px;
    line-height:1.35;
  }

  #quiz-card.answered #quiz-continue{
    min-height:40px;
    margin-top:9px;
    font-size:14px;
    box-shadow:0 5px 12px rgba(0,0,0,.35);
  }
}

@media (orientation:portrait) and (max-width:430px){
  #quiz-card.answered #quiz-result{
    padding:15px 13px;
  }

  #quiz-card.answered #quiz-result-title{
    font-size:20px;
  }

  #quiz-result-answer{
    font-size:14px;
  }
}

</style>
<!-- Integrity Energy Hero build 10.1 no jump -->
</head>

<body>
<section id="browser-notice" aria-hidden="true">
  <div id="browser-notice-card" role="dialog" aria-modal="true" aria-labelledby="browser-notice-title">
    <p id="browser-notice-icon">💡</p>
    <h2 id="browser-notice-title">Chrome 브라우저를 권장합니다</h2>
    <p id="browser-notice-text">
      현재 Safari에서 실행 중입니다.<br>
      보다 안정적인 화면 비율과 조작을 위해<br>
      <strong>Google Chrome</strong>에서 플레이해 주세요.
    </p>
    <button id="browser-notice-confirm" type="button">확인하고 계속하기</button>
  </div>
</section>

<div id="rotate-notice">📱<br>원활한 게임 진행을 위해<br>휴대폰을 가로로 돌려주세요.</div>
<div id="loading">에셋 불러오는 중…</div>

<main id="app">
  <div id="game-wrap">
    <canvas id="c" width="1280" height="720" aria-label="청렴 에너지 히어로 게임"></canvas>

    <section id="quiz-overlay" aria-hidden="true">
      <div id="quiz-card" role="dialog" aria-modal="true" aria-labelledby="quiz-title">
        <p id="quiz-slime-quote"></p>
        <h2 id="quiz-title">청렴 선택</h2>
        <p id="quiz-question"></p>
        <div id="quiz-choices"></div>
        <div id="quiz-result">
          <h3 id="quiz-result-title"></h3>
          <p id="quiz-result-answer"></p>
          <div id="quiz-result-divider" aria-hidden="true"></div>
          <p id="quiz-result-explain"></p>
        </div>
        <button id="quiz-continue" type="button">계속하기</button>
      </div>
    </section>

    <section id="result-actions" aria-hidden="true">
      <div id="result-card" role="dialog" aria-modal="false" aria-label="게임 결과 인증 및 다시하기">
        <p id="result-guide">📸 최종 청렴도 화면을 캡처한 후<br>아래 버튼을 눌러주세요.</p>
        <button id="result-restart" type="button">🔄 다시하기</button>
      </div>
    </section>

  </div>

  <nav id="mobile-controls" aria-label="모바일 조작 버튼">
    <div class="control-group move">
      <div class="button-wrap">
        <button class="touch-btn" id="btn-left" aria-label="왼쪽 이동">◀</button>
        <span class="control-label">왼쪽</span>
      </div>
      <div class="button-wrap">
        <button class="touch-btn" id="btn-right" aria-label="오른쪽 이동">▶</button>
        <span class="control-label">오른쪽</span>
      </div>
    </div>

    <div class="control-group action">
      <div class="button-wrap">
        <button class="touch-btn action-btn" id="btn-attack" aria-label="청렴의 검 공격">⚔</button>
        <span class="control-label">공격</span>
      </div>
      <div class="button-wrap">
        <button class="touch-btn shield-btn" id="btn-shield" aria-label="이해충돌 방패">🛡</button>
        <span class="control-label">방패</span>
      </div>
    </div>
  </nav>
</main>
<script src="game.js?v=10.1-no-jump"></script>
